user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

# The wall is WebSocket-heavy: every viewer holds a connection open, and each
# one costs two descriptors here (client + upstream). The nginx default of 1024
# would cap us at ~500 concurrent viewers per worker.
worker_rlimit_nofile 65535;

events {
    worker_connections  16384;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;
    server_tokens   off;

    log_format json escape=json '{"time":"$time_iso8601","remote":"$remote_addr",'
        '"method":"$request_method","uri":"$request_uri","status":$status,'
        '"bytes":$body_bytes_sent,"rt":$request_time,"ua":"$http_user_agent",'
        '"request_id":"$upstream_http_x_request_id"}';
    access_log /var/log/nginx/access.log json;

    gzip              on;
    gzip_types        application/json;
    gzip_min_length   1024;
    gzip_proxied      any;

    upstream founderwall_api {
        server api:8000;
        keepalive 64;
    }

    upstream founderwall_web {
        server web:3000;
        keepalive 32;
    }

    # Request rate per client IP.
    limit_req_zone $binary_remote_addr zone=api_rl:10m rate=30r/s;
    # Concurrent connections per client IP — the guard against a socket flood.
    limit_conn_zone $binary_remote_addr zone=ws_conn:10m;

    server {
        listen 80;
        server_name _;

        client_max_body_size 1m;
        client_body_timeout  10s;
        client_header_timeout 10s;

        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy no-referrer always;

        # SECURITY: X-Forwarded-For is *replaced*, never appended. The app
        # trusts the left-most entry to rate limit by client IP, so appending
        # (proxy_add_x_forwarded_for) would let a client forge a header and mint
        # a fresh rate-limit bucket per request. nginx is the only trusted hop,
        # so $remote_addr is authoritative.
        #
        # If you put a CDN in front of nginx, $remote_addr becomes the CDN and
        # this must change to trust the CDN's forwarded chain instead.
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;

        location = /health/live {
            proxy_pass http://founderwall_api;
            access_log off;
        }

        location /health {
            proxy_pass http://founderwall_api;
            access_log off;
        }

        # WebSocket endpoint needs Upgrade headers and a long read timeout.
        # ^~ so no regex location can steal it.
        location ^~ /ws/ {
            limit_conn ws_conn 20;
            proxy_pass http://founderwall_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # The API surface. The backend runs with an empty api_prefix, so these
        # paths sit at the root next to the frontend's routes — list them
        # explicitly and send them to the api; everything else is the frontend.
        location ~ ^/(auth|wall|stats|moderation|analytics|docs|openapi\.json) {
            limit_req zone=api_rl burst=60 nodelay;
            limit_conn ws_conn 100;
            proxy_pass http://founderwall_api;
            proxy_http_version 1.1;
            # Required for upstream keepalive to be used.
            proxy_set_header Connection "";
        }

        # The Next.js frontend serves everything else — pages and /_next assets.
        location / {
            limit_conn ws_conn 100;
            proxy_pass http://founderwall_web;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
