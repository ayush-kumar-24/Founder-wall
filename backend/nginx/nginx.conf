user  nginx;
worker_processes  auto;
# error_log path is symlinked to stderr in the official image → Docker logs.
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

# The wall is WebSocket-heavy: every viewer holds a connection open, and each
# one costs two descriptors here (client + upstream).
worker_rlimit_nofile 65535;

events {
    worker_connections  16384;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    server_tokens   off;
    server_names_hash_bucket_size 128;

    # ---- Logging (access → stdout, error → stderr, both via image symlinks,
    #      rotated by the compose json-file driver from Phase 2) ----
    log_format json escape=json '{"time":"$time_iso8601","remote":"$remote_addr",'
        '"method":"$request_method","uri":"$request_uri","status":$status,'
        '"bytes":$body_bytes_sent,"rt":$request_time,"ua":"$http_user_agent",'
        '"proto":"$scheme","request_id":"$upstream_http_x_request_id"}';
    access_log /var/log/nginx/access.log json;

    # ---- Compression (gzip; brotli would need a custom nginx build) ----
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_proxied      any;
    gzip_types        application/json application/javascript text/css text/plain
                      text/javascript image/svg+xml application/xml application/wasm
                      font/woff font/woff2;

    # ---- Upstreams ----
    upstream founderwall_api     { server api:8000;     keepalive 64; }
    upstream founderwall_web     { server web:3000;     keepalive 32; }
    upstream founderwall_adminer { server adminer:8080; keepalive 8;  }

    # Per-client-IP rate + connection guards (defense-in-depth; the app also
    # rate-limits internally).
    limit_req_zone  $binary_remote_addr zone=api_rl:10m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # WebSocket upgrade helper.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # SECURITY: X-Forwarded-For is *replaced*, not appended — nginx is the only
    # trusted hop, so a client cannot forge the header to dodge rate limiting.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;

    # ============================================================
    #  HTTP :80 — ACME challenge, internal health, HTTPS redirect
    # ============================================================
    server {
        listen 80;
        listen [::]:80;
        server_name founderwall.example.com;   # ←← REPLACE with your domain

        # Let's Encrypt webroot challenge — MUST stay reachable over plain HTTP.
        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type "text/plain";
        }

        # Internal container health check (compose) — served on HTTP, no redirect.
        location = /health/live {
            proxy_pass http://founderwall_api;
            proxy_set_header Connection "";
            access_log off;
        }

        # Everything else → HTTPS.
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ============================================================
    #  HTTPS :443 — the application
    # ============================================================
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name founderwall.example.com;   # ←← REPLACE with your domain

        # Certs obtained in Phase 6 (Let's Encrypt). nginx will not start until
        # these exist — Phase 6's init creates them (or a self-signed bootstrap)
        # before nginx serves :443.
        ssl_certificate     /etc/letsencrypt/live/founderwall.example.com/fullchain.pem; # ←← REPLACE domain
        ssl_certificate_key /etc/letsencrypt/live/founderwall.example.com/privkey.pem;   # ←← REPLACE domain
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # ---- Request limits (the app's bodies are tiny JSON; be generous but
        #      bounded so an oversized upload can't tie up a worker) ----
        client_max_body_size 1m;
        client_body_timeout  10s;
        client_header_timeout 10s;

        # ---- Security headers (apply to every response) ----
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options        SAMEORIGIN always;   # Google GIS uses iframes
        add_header Referrer-Policy        strict-origin-when-cross-origin always;
        add_header X-XSS-Protection       "0" always;
        # HSTS: only enable AFTER you've confirmed HTTPS works end-to-end
        # (below it is on with a 1-year max-age; remove the line to disable).
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # NOTE: a Content-Security-Policy is intentionally omitted — Google
        # Identity Services + the app's inline styles need a tailored policy;
        # add one deliberately once you can test sign-in against it.

        proxy_set_header Connection "";   # reuse upstream keepalive by default

        # ---- Maintenance mode ----
        # When the upstreams are down (planned maintenance / cutover:
        #   docker compose stop web api), serve a friendly page instead of a
        # raw 502 — so users can't submit writes during the window.
        proxy_intercept_errors on;
        error_page 502 504 = @maintenance;
        location @maintenance {
            root /var/www/maintenance;
            rewrite ^ /index.html break;
        }

        # ===========================================================
        #  ROUTES  (every path verified against the FastAPI routers)
        #    /                 → web (Next.js)              ✓
        #    /_next/static/*   → web, immutable cache       ✓
        #    /auth/*           → api                        ✓
        #    /wall/*           → api                        ✓
        #    /stats            → api                        ✓
        #    /analytics/*      → api                        ✓
        #    /moderation/*     → api                        ✓
        #    /docs, /openapi.json → api (if ENABLE_DOCS)    ✓
        #    /health, /health/*→ api                        ✓
        #    /ws/*             → api (WebSocket upgrade)    ✓
        #    /adminer/         → adminer (basic-auth)       ✓
        # ===========================================================

        # --- Next.js hashed static assets: long-lived immutable cache ---
        location ^~ /_next/static/ {
            proxy_pass http://founderwall_web;
            # (re-declare the headers we care about — a location with any
            #  add_header drops inherited ones)
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Content-Type-Options nosniff always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            access_log off;
        }
        location ^~ /_next/ {
            proxy_pass http://founderwall_web;
        }

        # --- WebSocket: /ws/* with the upgrade dance + long read timeout ---
        location ^~ /ws/ {
            limit_conn conn 20;
            proxy_pass http://founderwall_api;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }

        # --- FastAPI: one block per prefix (explicit, verifiable) ---
        location /auth/ {
            limit_req zone=api_rl burst=60 nodelay;
            proxy_pass http://founderwall_api;
        }
        location /wall/ {
            limit_req zone=api_rl burst=60 nodelay;
            proxy_pass http://founderwall_api;
        }
        location /stats {
            proxy_pass http://founderwall_api;
        }
        location /analytics/ {
            limit_req zone=api_rl burst=60 nodelay;
            proxy_pass http://founderwall_api;
        }
        location /moderation/ {
            limit_req zone=api_rl burst=60 nodelay;
            proxy_pass http://founderwall_api;
        }
        location /health {
            proxy_pass http://founderwall_api;
            access_log off;
        }
        location /docs {
            proxy_pass http://founderwall_api;
        }
        location = /openapi.json {
            proxy_pass http://founderwall_api;
        }

        # --- Adminer: NOT exposed publicly (recommended). Reach it via an SSH
        #     tunnel instead — uncomment the localhost bind in docker-compose and:
        #       ssh -L 8080:localhost:8080 user@your-vps   →   http://localhost:8080
        #
        #     If you DO want browser access over the domain, uncomment the block
        #     below, keep Basic-auth, and add an IP allowlist. You must then also
        #     mount ./nginx/.htpasswd into the nginx service and create it:
        #       docker run --rm httpd:alpine htpasswd -nbB admin 'StrongPass' \
        #         > backend/nginx/.htpasswd
        #
        # location /adminer/ {
        #     auth_basic           "Founder Wall — Admin";
        #     auth_basic_user_file /etc/nginx/.htpasswd;
        #     allow 203.0.113.4;   # ← your IP only
        #     deny  all;
        #     proxy_pass http://founderwall_adminer/;
        # }

        # --- Frontend: everything else → Next.js ---
        location / {
            limit_conn conn 100;
            proxy_pass http://founderwall_web;
        }
    }
}
