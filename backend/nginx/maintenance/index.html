<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Founder's Wall — back shortly</title>
<style>
  html,body{margin:0;height:100%;background:#ece0c4;color:#2b241a;
    font-family:ui-rounded,"Segoe UI",system-ui,sans-serif;}
  body{display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;}
  .card{background:#f3d15e;max-width:420px;padding:40px 32px;border-radius:3px;
    box-shadow:0 14px 24px -12px rgba(30,20,5,.5),0 4px 8px rgba(30,20,5,.15);
    transform:rotate(-1.5deg);position:relative;}
  .tape{position:absolute;top:-13px;left:50%;width:70px;height:24px;
    transform:translateX(-50%) rotate(-3deg);background:rgba(239,232,207,.75);
    box-shadow:0 3px 5px rgba(0,0,0,.14);}
  h1{font-size:1.8rem;margin:.2rem 0 .6rem;}
  p{margin:.4rem 0;line-height:1.5;color:#463d2d;}
</style>
</head>
<body>
  <div class="card">
    <span class="tape"></span>
    <h1>Back in a moment</h1>
    <p>Founder's Wall is undergoing brief maintenance.</p>
    <p>Your notes are safe — please check back shortly.</p>
  </div>
</body>
</html>
